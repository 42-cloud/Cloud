---
- name: Verify Docker
  hosts: all
  gather_facts: false
  tasks:

    - name: Load role default vars
      ansible.builtin.include_vars:
        file: "../../defaults/main.yml"

    # --- VERIFICATION DOCKER DEPENDENCIES  ---
    - name: Gather package stats
      ansible.bultin.package_facts:
        strategy: all
    
    - name: Check presence of docker dependencies
      ansible.builtin.assert:
        that:
          - item in ansible_facts.packages
        loop:
           - apt-transport-https
           - ca-certificates
           - curl
           - gnupg

    # --- VERIFICATION GPG ---
    - name: Gather stat for gpg
      ansible.builtin.stat:
        path: "{{ __docker_gpg_path }}"
      register: gpg

    - name: Check presence and permissions are 0644
      ansible.builtin.assert:
        that:
          - gpg.stat.exists
          - gpg.stat.mode == '0644'
    
    # --- VERIFICATION DOCKER REPOSITORY ---
    - name: Gather stat for repo
      ansible.builtin.stat:
        path: "{{ __docker_repo_config_file_path }}"
      register: docker_repo_config
    
    - name: Check presence and permissions are 0644
      ansible.builtin.assert:
        that:
          - docker_repo_config.stat.exists
          - docker_repo_config.stat.mode == '0644'

    # --- VERIFICATION DOCKER INSTALLATION ---
    - name: Gather package stats
      ansible.bultin.package_facts:
        strategy: all

    - name: Check presence of docker and docker compose
      ansible.builtin.assert:
        that:
          - item in ansible_facts.packages
        loop:
           - docker-ce
           - docker-compose-plugin

    - name: Check docker version
      ansible.builtin.assert:
        that:
          - ansible_facts.packages['docker-ce'][0]['version'] is version(docker_minimal_version, '>=')

    - name: Gather service info
      ansible.builtin.service_facts:
        
    - name: Check docker version
      ansible.builtin.assert:
        that:
          - ansible_facts.services['docker.service'].state == 'running'
