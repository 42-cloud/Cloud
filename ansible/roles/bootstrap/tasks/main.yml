---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Allow all traffic on loopback interface
  community.general.ufw:
    rule: allow
    direction: in
    interface: lo

- name: Configure UFW defaults
  community.general.ufw:
    policy: deny
    direction: incoming

- name: Allow SSH, HTTP and HTTPS traffic
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"
    - "80"
    - "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Create persistent directories for db with mysql permission
  ansible.builtin.file:
    path: "{{ bootstrap_db_dir }}"
    state: directory
    owner: "{{ bootstrap_db_uid | int }}"
    group: "{{ bootstrap_db_gid | int }}"
    mode: "0700"

- name: Create persistent directories for wordpress with www-data permission
  ansible.builtin.file:
    path: "{{ bootstrap_wp_dir }}"
    state: directory
    owner: "{{ bootstrap_wp_uid | int }}"
    group: "{{ bootstrap_wp_gid | int }}"
    mode: "0755"
