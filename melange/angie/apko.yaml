contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - ./melange.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
    - ./
  packages:
    - wolfi-baselayout
    - angie

entrypoint:
  command: /usr/bin/angie -g "daemon off; pid /tmp/angie.pid;"

accounts:
  users:
    - username: angie
      uid: 65532
  groups:
    - groupname: angie
      gid: 65532
  run-as: "65532"

paths:
  - path: /var/log/angie
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/cache/angie
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /run/angie
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

archs:
  - amd64
