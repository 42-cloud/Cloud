contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - ./melange.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
    - ./
  packages:
    - wolfi-baselayout
    - busybox
    - php-8.3
    - php-8.3-mbstring
    - php-8.3-mysqlnd
    - php-8.3-pdo_mysql
    - php-8.3-mysqli
    - php-8.3-curl
    - php-8.3-openssl
    - php-8.3-gd
    - php-8.3-intl
    - php-8.3-fileinfo
    - phpmyadmin

entrypoint:
  command: /usr/bin/php -S 0.0.0.0:80 -t /var/www/html

accounts:
  users:
    - username: nonroot
      uid: 65532
  groups:
    - groupname: nonroot
      gid: 65532
  run-as: "65532"

archs:
  - amd64
